<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img"
     aria-label="eldr — a zero-crate hardware monitor and protective watchdog for Apple Silicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101117"/>
      <stop offset="1" stop-color="#08090c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.46" r="0.42">
      <stop offset="0" stop-color="#ff5a1f" stop-opacity="0.30"/>
      <stop offset="0.6" stop-color="#c01f00" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#c01f00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fire" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#6e1200"/>
      <stop offset="0.42" stop-color="#e8430a"/>
      <stop offset="0.74" stop-color="#ff8a1e"/>
      <stop offset="1" stop-color="#ffd24a"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ff7a1a"/>
      <stop offset="1" stop-color="#ffe9a3"/>
    </linearGradient>
    <radialGradient id="hot" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff3c4" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fff3c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <ellipse cx="640" cy="300" rx="520" ry="320" fill="url(#glow)"/>

  <!-- flame (512-space paths, scaled + centered at x=640) -->
  <g transform="translate(422,-22) scale(0.86)">
    <path d="M256 392 C198 388 168 330 192 272 C210 228 232 224 218 176
             C212 150 226 128 258 120 C252 168 286 178 294 222
             C306 272 326 300 308 346 C296 380 286 392 256 392 Z" fill="url(#fire)"/>
    <path d="M256 388 C220 384 204 344 220 304 C230 278 248 272 244 240
             C268 258 280 286 278 316 C276 352 276 376 256 388 Z" fill="url(#core)"/>
    <ellipse cx="254" cy="330" rx="22" ry="40" fill="url(#hot)"/>
    <circle cx="300" cy="190" r="4"   fill="#ffb43c" opacity="0.85"/>
    <circle cx="206" cy="214" r="3"   fill="#ff8a1e" opacity="0.7"/>
    <circle cx="284" cy="134" r="2.6" fill="#ffd24a" opacity="0.85"/>
  </g>

  <text x="640" y="430" text-anchor="middle"
        font-family="'Inter','Helvetica Neue',Arial,sans-serif"
        font-size="150" font-weight="800" letter-spacing="-6" fill="#f6efe6">eldr</text>

  <text x="640" y="492" text-anchor="middle"
        font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace"
        font-size="27" fill="#cfc7bc">zero-crate hardware monitor + thermal watchdog for Apple Silicon</text>

  <text x="640" y="540" text-anchor="middle"
        font-family="'JetBrains Mono','SF Mono',ui-monospace,Menlo,monospace"
        font-size="22" fill="#8b8076">no sudo<tspan fill="#5f5a53"> · </tspan>hand-written FFI<tspan fill="#5f5a53"> · </tspan>Old Norse for “fire”</text>
</svg>
